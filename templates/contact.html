<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    {% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="alert alert-success">
      {{ messages[0] }}
    </div>
  {% endif %}
{% endwith %}
    <h2>Contact Me</h2>
    <form method="POST">
        <input class="form-control mb-3" type="text" name="name" placeholder="Your Name" required>
        <input class="form-control mb-3" type="email" name="email" placeholder="Your Email" required>
        <textarea class="form-control mb-3" name="message" placeholder="Your Message" required></textarea>
        <button class="btn btn-success">Send Message</button>
    </form>
</div>

</body>
</html>
