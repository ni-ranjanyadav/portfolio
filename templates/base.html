<!DOCTYPE html>
<html>
<head>
    <title>Niranjan Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black py-3">
  <div class="container">

    <!-- Left Side Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold fs-5" href="/">
    
    <img src="{{ url_for('static', filename='images/profile.png') }}" 
     style="width:40px; height:40px; border-radius:50%; object-fit:cover;">

    Niranjan

    </a>

    <!-- Right Side Links -->
    <div class="ms-auto d-flex align-items-center gap-4">

      <a class="nav-link text-white" href="/">Home</a>
      <a class="nav-link text-white" href="/projects">Projects</a>
      <a class="nav-link text-white" href="/contact">Contact</a>

      <a class="btn btn-primary px-3 py-1" href="/resume">
      Resume
      </a>
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<button onclick="toggleTheme()" class="btn btn-warning mt-3">Toggle Theme</button>

<script>
function toggleTheme() {
  document.body.classList.toggle("bg-dark");
  document.body.classList.toggle("text-white");
}
</script>

</body>
</html>
